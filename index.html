<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro de Actividad Mensual</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #25D366; /* WhatsApp Green */
            --bg-body: #f4f7f6;
            --text-main: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--bg-body);
            padding-bottom: 10px;
        }

        /* Ajuste crucial para iOS: Evita zoom en inputs */
        input, select {
            font-size: 16px !important;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            padding: 10px;
            font-size: 0.9em;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #eee;
            text-align: center;
        }

        .input-num {
            width: 50px;
            text-align: center;
        }

        .fila-totales {
            background-color: #e8f4fd;
            font-weight: bold;
        }

        .btn-whatsapp {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-whatsapp:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <label for="mes-registro"><b>Mes:</b></label>
        <select id="mes-registro">
            <option value="Septiembre 2025">Septiembre 2025</option>
            <option value="Octubre 2025">Octubre 2025</option>
            <option value="Noviembre 2025">Noviembre 2025</option>
            <option value="Diciembre 2025">Diciembre 2025</option>
            <option value="Enero 2026">Enero 2026</option>
            <option value="Febrero 2026">Febrero 2026</option>
            <option value="Marzo 2026">Marzo 2026</option>
            <option value="Abril 2026">Abril 2026</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>Semana/Día</th>
                <th>Horas</th>
                <th>Cursos</th>
            </tr>
        </thead>
        <tbody id="cuerpo-tabla">
            <tr class="fila-datos">
                <td>Actividad</td>
                <td><input type="number" class="input-horas" value="0" oninput="calcularTodo()"></td>
                <td><input type="number" class="input-cursos" value="0" oninput="calcularTodo()"></td>
            </tr>
            </tbody>
        <tfoot>
            <tr class="fila-totales">
                <td>TOTALES</td>
                <td id="total-horas">0</td>
                <td id="promedio-cursos">0.0</td>
            </tr>
        </tfoot>
    </table>

    <button class="btn-whatsapp" onclick="compartirWhatsApp()">
        Compartir por WhatsApp
    </button>
</div>

<script>
    // 1. Auto-selección de mes al cargar
    document.addEventListener('DOMContentLoaded', () => {
        const fecha = new Date();
        const formato = { month: 'long', year: 'numeric' };
        let mesActual = fecha.toLocaleDateString('es-ES', formato);
        mesActual = mesActual.charAt(0).toUpperCase() + mesActual.slice(1);

        const sel = document.getElementById('mes-registro');
        for (let i = 0; i < sel.options.length; i++) {
            if (sel.options[i].value === mesActual) {
                sel.selectedIndex = i;
                break;
            }
        }
        calcularTodo();
    });

    // 2. Cálculo de Horas y Promedio de Cursos
    function calcularTodo() {
        let horasTotales = 0;
        let sumaCursos = 0;
        let conteoMeses = 0;

        document.querySelectorAll('.fila-datos').forEach(fila => {
            const h = parseFloat(fila.querySelector('.input-horas').value) || 0;
            const c = parseFloat(fila.querySelector('.input-cursos').value) || 0;

            horasTotales += h;
            if (c > 0) {
                sumaCursos += c;
                conteoMeses++;
            }
        });

        const promedio = conteoMeses > 0 ? (sumaCursos / conteoMeses).toFixed(1) : "0.0";

        document.getElementById('total-horas').innerText = horasTotales;
        document.getElementById('promedio-cursos').innerText = promedio;
    }

    // 3. Compartir con compatibilidad Android/iOS
    function compartirWhatsApp() {
        const mes = document.getElementById('mes-registro').value;
        const horas = document.getElementById('total-horas').innerText;
        const promedio = document.getElementById('promedio-cursos').innerText;

        const texto = `*Registro de Actividad*\n` +
                      `📅 *Mes:* ${mes}\n` +
                      `⏱️ *Horas:* ${horas}\n` +
                      `📚 *Promedio Cursos:* ${promedio}\n\n` +
                      `_Enviado desde mi Registro Web_`;

        const url = `https://wa.me/?text=${encodeURIComponent(texto)}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
